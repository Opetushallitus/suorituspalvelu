services:
  postgres:
    image: postgres:15
    restart: always
    
    networks:
      - supanet
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: 
     - .env.docker
     - .env.docker.local
    ports:
      - "8443:8443"
    networks:
      - supanet
    volumes:
      - .:/app
    depends_on:
      - postgres
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    networks:
      - supanet
    volumes:
      - ./suorituspalvelu-ui:/app
  nginx:
    image: nginx:alpine
    env_file:
      - .env.docker
      - .env.docker.local
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/templates/default.conf.template:ro
    networks:
      - supanet
    depends_on:
      - frontend
      - backend
networks:
  supanet:
    driver: bridge
volumes:
  pgdata:
